<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--Google Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style/index.css">
    <!---CDN Font Awesome & Favicon-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />    <!---Favicon-->
    <link rel="apple-touch-icon" sizes="180x180" href="./icon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./icon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./icon/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <title>Movie Watchlist</title>
</head>
<body>

    <header id="intro">

        <h1>Find Your Film</h1>
        <a href="watchlist.html">My Watchlist</a>

    </header>

    <main>
        <div class="search-container">
            <span class="search-icon" aria-hidden="true"><i class="fa-solid fa-magnifying-glass"></i></span>
            <input id="movie-search" type="search" placeholder="Search movies..." aria-label="Search movies">
            <button type="button" class="search-button" id="search-btn">Search</button>
        </div>
        <section id="movies">
            <div class="placeholder" id="placeholder">

                <i class="fa-solid fa-clapperboard movie"  ></i>
                <h2>Start exploring</h2>

            </div>
            
        </section>

    </main>

    <script src="./js/index.js" type="module"></script>
    
</body>
</html>
